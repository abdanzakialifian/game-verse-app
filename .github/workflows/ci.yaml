# reference : https://tharunbalaji2004.hashnode.dev/android-ci-cd

name: CI/CD Pipeline

run-name: Build ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'debug'

jobs:
  android-lint-and-test:
    name: Android Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run lint
        run: ./gradlew :androidApp:lintDebug

      - name: Run Unit Test
        run: ./gradlew :shared:testDebugUnitTest :androidApp:testDebugUnitTest

      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path : androidApp/build/reports/lint-results-debug.html

  android-instrumentation-test:
    name: Android Instrumentation Testing
    runs-on: ubuntu-latest
    needs: [android-lint-and-test]
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run espresso tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_3a
          emulator-boot-timeout: 600
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -accel off -no-snapshot
          disable-animations: true
          script: ./gradlew :androidApp:connectedDebugAndroidTest

      - name: Upload Instrumentation Test Report
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation_test_report
          path: androidApp/build/reports/androidTests/connected

  ios-build-check:
    name: iOS Build Check
    runs-on: macos-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build iOS Framework (shared)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

  static-code-analysis:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [android-lint-and-test]
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: SonarCloud Scan # sonarcloud properties in gradle.properties file
        run: ./gradlew :androidApp:sonarqube -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [android-lint-and-test]
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gameverse-debug.apk
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk